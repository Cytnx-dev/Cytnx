name: Release to PyPI

on:
  pull_request:
  workflow_dispatch:

jobs:
  BuildWheel:
    name: BuildWheel-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # os: [ubuntu-latest, macos-14, macos-15-intel]
    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # When re-running a PR job, GitHub Actions uses the merge commit created at
    # the time of the original run, not a fresh merge with the latest target branch.
    # This step ensures we always test against the most recent target branch.
    - name: Merge with latest target branch (pull_request only)
      if: github.event_name == 'pull_request'
      run: |
        git fetch origin ${{ github.event.pull_request.base.ref }}
        git merge --no-edit origin/${{ github.event.pull_request.base.ref }}

    - name: Cache Ccache Directory (pull_request)
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/cache@v4
      with:
        path: |
          ~/.ccache
        key: ccache-${{ runner.os }}-${{ github.event.pull_request.head.ref }}-${{ github.sha }}
        restore-keys: |
          ccache-${{ runner.os }}-${{ github.event.pull_request.head.ref }}-
          ccache-${{ runner.os }}-${{ github.event.pull_request.base.ref }}-

    - name: Set Ccache Directory
      run: |
        echo "Start building---------------------------------"
        export CCACHE_DIR="${HOME}/.ccache"

    - name: Setup macOS
      if: matrix.os == 'macos-15-intel' || matrix.os == 'macos-14'
      run: |
        if [[ ${{ matrix.os }} == 'macos-15-intel' ]]; then
          echo "MACOSX_DEPLOYMENT_TARGET=15.0" >> "$GITHUB_ENV"
        elif [[ ${{ matrix.os }} == 'macos-14' ]]; then
          echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> "$GITHUB_ENV"
        fi


    - name: Validate ccache reuse across Python versions (Linux pull_request)
      if: ${{ github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest' }}
      run: |
        set -euo pipefail

        export CCACHE_DIR="${HOME}/.ccache"

        if ! python -m pip show cibuildwheel >/dev/null 2>&1; then
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel
        fi

        if ! command -v ccache >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y ccache
        fi

        ccache --zero-stats
        CIBW_BUILD='cp39-manylinux_x86_64'         CIBW_ARCHS_LINUX='x86_64'         CIBW_BEFORE_ALL_LINUX='bash {package}/tools/cibuildwheel_before_all.sh'         CIBW_BEFORE_BUILD_LINUX='python {package}/tools/cibuildwheel_before_build.py'         CIBW_CONTAINER_ENGINE="docker; create_args: --volume $HOME/.ccache:/host_ccache"         CIBW_ENVIRONMENT_LINUX='CCACHE_DIR=/host_ccache CCACHE_CONFIGPATH=/host_ccache/ccache.conf CCACHE_COMPILERCHECK=none CMAKE_C_COMPILER_LAUNCHER=ccache CMAKE_CXX_COMPILER_LAUNCHER=ccache'         CIBW_REPAIR_WHEEL_COMMAND_LINUX='cp {wheel} {dest_dir}'         python -m cibuildwheel --platform linux --output-dir wheelhouse-cp39

        ccache --zero-stats
        CIBW_BUILD='cp310-manylinux_x86_64'         CIBW_ARCHS_LINUX='x86_64'         CIBW_BEFORE_ALL_LINUX='bash {package}/tools/cibuildwheel_before_all.sh'         CIBW_BEFORE_BUILD_LINUX='python {package}/tools/cibuildwheel_before_build.py'         CIBW_CONTAINER_ENGINE="docker; create_args: --volume $HOME/.ccache:/host_ccache"         CIBW_ENVIRONMENT_LINUX='CCACHE_DIR=/host_ccache CCACHE_CONFIGPATH=/host_ccache/ccache.conf CCACHE_COMPILERCHECK=none CMAKE_C_COMPILER_LAUNCHER=ccache CMAKE_CXX_COMPILER_LAUNCHER=ccache'         CIBW_REPAIR_WHEEL_COMMAND_LINUX='cp {wheel} {dest_dir}'         python -m cibuildwheel --platform linux --output-dir wheelhouse-cp310

        python - <<'PY2'
        import subprocess

        raw = subprocess.check_output(['ccache', '--print-stats'], text=True)
        stats = {}
        for line in raw.splitlines():
            if '	' not in line:
                continue
            key, value = line.split('	', 1)
            stats[key.strip()] = value.strip()

        def to_num(v):
            token = v.split()[0] if v else '0'
            try:
                return float(token)
            except Exception:
                return 0.0

        direct_hits = to_num(stats.get('direct_cache_hit', stats.get('cache_hit_direct', '0')))
        preprocessed_hits = to_num(stats.get('preprocessed_cache_hit', stats.get('cache_hit_preprocessed', '0')))
        total_hits = direct_hits + preprocessed_hits

        print(f'cache_hit_direct={direct_hits}')
        print(f'cache_hit_preprocessed={preprocessed_hits}')
        if total_hits <= 0:
            raise SystemExit('No ccache hits detected during cp310 whole-project build; cache likely not shared across versions.')
        PY2

        exit 0

    - name: Build Wheels
      if: ${{ !(github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest') }}
      uses: pypa/cibuildwheel@v3.3.0
      env:
        CMAKE_C_COMPILER_LAUNCHER: ccache
        CMAKE_CXX_COMPILER_LAUNCHER: ccache
        CMAKE_CUDA_COMPILER_LAUNCHER: ccache
        # DO NOT enable this line because the script for conda build is not
        # executed in a interactive shell, and "~" will not be expanded to the
        # home directory. Export CCACHE_DIR in the run command instead.
        # CCACHE_DIR: ~/.ccache
        CCACHE_MAXSIZE: 1G  # The limit of actions/cache is 10GB
        # Pass environment variables into cibuildwheel build environments
        # This is only needed on Linux becuase the wheels are built in docker
        # images only on Linux.
        CIBW_ENVIRONMENT_PASS_LINUX: CMAKE_C_COMPILER_LAUNCHER CMAKE_CXX_COMPILER_LAUNCHER CMAKE_CUDA_COMPILER_LAUNCHER CCACHE_MAXSIZE

    - uses: actions/upload-artifact@v4
      with:
        name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
        path: ./wheelhouse/*.whl
