name: gpu-smoke-test

# Manual trigger — run from the repo's Actions tab.
on:
  workflow_dispatch:

jobs:
  gpu-check:
    # Target the self-hosted CUDA runner by its labels.
    runs-on: [self-hosted, linux, x64, cuda, gpu, v100]
    steps:
      - name: nvidia-smi on the host
        run: nvidia-smi

      - name: nvidia-smi inside a CUDA container
        run: |
          docker run --rm --gpus all \
            nvidia/cuda:12.4.1-base-ubuntu22.04 nvidia-smi

      - name: deviceQuery-style check (torch, optional)
        run: |
          docker run --rm --gpus all pytorch/pytorch:latest \
            python -c "import torch; print('CUDA available:', torch.cuda.is_available()); print('devices:', torch.cuda.device_count())"
