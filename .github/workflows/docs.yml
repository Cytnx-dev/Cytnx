name: Publish Sphinx Documentation

on:
  push:
    branches:
      - master

jobs:
  publish_sphinx_docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: "docs/uv.lock"
      - name: Install dependencies
        working-directory: docs
        run: |
          uv sync
          sudo apt-get update && sudo apt-get install -y doxygen graphviz
      - name: Build api documentation
        working-directory: docs
        run: |
          uv run bash api_doc_script.sh
      - name: Sphinx build
        working-directory: docs
        run: |
          uv run sphinx-build -M html source build
      - name: Move api_build into html output
        working-directory: docs
        run: |
          mv build/api_build build/html/api_build
      - name: Deploy
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v4.1.0
        with:
          publish_branch: gh-pages
          personal_token: ${{ secrets.PAGES_PAT }}
          external_repository: Cytnx-dev/Cytnx_doc
          publish_dir: docs/build/html/
          force_orphan: true
