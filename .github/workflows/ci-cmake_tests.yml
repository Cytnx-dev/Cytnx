name: Tests and Codecov
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  BuildAndTest:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Login shell (-l) so conda activation is sourced, plus fail-fast
        # flags: -e aborts the step on the first failing command and
        # -o pipefail propagates failures through pipes. Overriding the
        # shell drops GitHub's default `-eo pipefail`, so set it back here.
        shell: bash -leo pipefail {0}
    env:
      # Pinned via --config-settings=build-dir=build below so ctest and
      # gcovr know where the build tree (and .gcno / .gcda files) live.
      BUILD_DIR: ${{ github.workspace }}/build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # When re-running a PR job, GitHub Actions uses the merge commit created at
      # the time of the original run, not a fresh merge with the latest target branch.
      # This step ensures we always test against the most recent target branch.
      # A committer identity is required because a non-fast-forward merge creates
      # a merge commit.
      - name: Merge with latest target branch (pull_request only)
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git merge --no-edit origin/${{ github.event.pull_request.base.ref }}
          # Refresh submodules in case the merge moved any gitlinks (e.g. cmake_modules/morse_cmake).
          git submodule update --init --recursive

      - uses: conda-incubator/setup-miniconda@v3
        with:
          # Specify python version your environment will have. Remember to quote this, or
          # YAML will think you want python 3.1 not 3.10
          python-version: "3.11"
          # This uses *miniforge*, rather than *miniconda*. The primary difference is that
          # the defaults channel is not enabled at all
          miniforge-version: latest
          # These properties enable the use of mamba, which is much faster and far less error
          # prone than conda while being completely compatible with the conda CLI
          use-mamba: true
          mamba-version: "*"

      - name: Install native dependencies
        # Only things pip cannot reasonably provide: native toolchain,
        # system C/C++ libraries, and gtest. BLAS is OpenBLAS to match
        # pyproject.toml's `--preset=openblas-cpu`.
        #
        # graphviz is the system package (the `dot`/`circo` executables),
        # which the PyPI `graphviz` package does not bundle. It is needed by
        # the Network.Diagram() rendering test (pytests/network_diagram_test.py);
        # the PyPI `graphviz` Python binding itself comes from the `viz` extra
        # pulled in by `.[dev]` below.
        #
        # All other Python packages -- runtime (numpy, graphviz, beartype),
        # build (scikit-build-core, pybind11), and dev (pytest, pytest-cov,
        # gcovr) -- come from pyproject.toml via the
        # `pip install --editable .[dev]` step below. That keeps
        # pyproject.toml as the single source of truth for everything
        # Python.
        run: |
          mamba install _openmp_mutex=*=*_llvm cmake make boost git compilers blas=*=openblas liblapacke arpack gtest graphviz

      - name: CPU info
        run: lscpu

      - name: Editable install (PEP 517, "Python package with a C++ component")
        # PyTorch-style idiom: build + install the extension through the same
        # wheel-build path users hit with `pip install .`, but in editable
        # mode so `import cytnx` resolves to the source tree with the
        # freshly built .so beside it. No PYTHONPATH override needed.
        #
        # PEP 517 build isolation provisions scikit-build-core and pybind11
        # automatically from pyproject.toml's `[build-system].requires`.
        # The compilers, cmake, gtest, OpenBLAS, etc. come from the conda
        # env above and are inherited via PATH (build isolation only
        # isolates Python packages, not env vars or executables on PATH).
        #
        # pyproject.toml already pins `--preset=openblas-cpu`. We override it
        # with the debug-openblas-cpu preset (see CMakePresets.json), which
        # gives coverage CI everything it needs from one place instead of
        # individual cmake.define overrides:
        #
        #   CMAKE_BUILD_TYPE=Debug
        #     -O0 / no inlining, so gcov line + branch hit counts aren't
        #     distorted by the optimizer (engineering convention for
        #     coverage measurement).
        #
        #   RUN_TESTS=ON
        #     Builds the gtest binary under tests/ AND triggers the
        #     compiler-portable coverage flags applied to the cytnx target
        #     (see CMakeLists.txt under `if(RUN_TESTS)`).
        #
        #   USE_DEBUG=ON
        #     Applies -fsanitize=address to the cytnx library, so this job
        #     is now the main CI gate that runs the whole suite under ASan.
        #     A real overlapping-memcpy UB bug (BlockUniTensor::combineBonds,
        #     #1052) went undetected for a long time because nothing in CI
        #     built with ASan on; only a developer happening to build with a
        #     debug-* preset locally would see it. The two Python-hosted
        #     steps below ("Sanity-check the install" and "Run pytest with
        #     Python coverage") need an LD_PRELOAD shim for ASan-instrumented
        #     cytnx.so to load correctly into the uninstrumented `python`
        #     binary; see the comments on those steps. The gtest steps need
        #     no shim since test_main links against ASan natively.
        #
        # build-dir=build pins scikit-build-core's build tree (it defaults
        # to a temp dir) so the subsequent ctest and gcovr steps have a
        # stable path to point at. It overrides the preset's own binaryDir
        # the same way it already overrides pyproject.toml's hardcoded
        # `--preset=openblas-cpu` below (cmake.args=--preset=X empirically
        # wins over the pyproject.toml default; see
        # .claude/skills/build-test-workflow/scripts/build_preset.sh for the
        # verified mechanics).
        run: |
          pip install --editable '.[dev]' --verbose \
            --config-settings=build-dir=build \
            --config-settings=cmake.args=--preset=debug-openblas-cpu

      - name: Resolve ASan runtime paths for Python-hosted steps
        id: asan_preload
        # ASan-instrumented cytnx.so loaded into the uninstrumented `python`
        # binary needs libasan.so preloaded, or every native (C++-side)
        # exception crashes the process: ASan's __cxa_throw interceptor
        # CHECK-fails on real___cxa_throw != 0 because plain `python` doesn't
        # link libstdc++ at all, so the interceptor can't resolve the real
        # symbol at init. libstdc++.so must be preloaded alongside libasan.so
        # for the same reason.
        #
        # Resolved from the build's own CMAKE_CXX_COMPILER (not a bare `gcc`
        # guess) -- preloading one GCC's libasan.so into a binary built by a
        # different compiler/GCC version is an ASan runtime/ABI mismatch, and
        # -print-file-name silently returns its bare input filename (a
        # relative path) when it can't resolve the library, which LD_PRELOAD
        # then fails to find. This CI job's toolchain is always GCC (the
        # `compilers` conda package above), so an unexpected result here
        # means something about the environment changed -- fail loudly
        # rather than silently skip the shim and hit a confusing crash two
        # steps later.
        #
        # A dedicated step so the lookup runs once and both Python-hosted
        # steps below reuse its output, instead of recomputing it twice.
        run: |
          compiler_path=$(grep "^CMAKE_CXX_COMPILER:FILEPATH=" "${{ env.BUILD_DIR }}/CMakeCache.txt" | head -n 1 | cut -d= -f2)
          if [[ -z "${compiler_path}" ]]; then
            echo "::error::CMAKE_CXX_COMPILER not found in ${{ env.BUILD_DIR }}/CMakeCache.txt" >&2
            exit 1
          fi
          if ! "${compiler_path}" --version 2>/dev/null | grep -q "Free Software Foundation"; then
            echo "::error::${compiler_path} does not identify as GCC; this job's ASan preload assumes GCC" >&2
            exit 1
          fi
          libasan_path=$("${compiler_path}" -print-file-name=libasan.so)
          libstdcxx_path=$("${compiler_path}" -print-file-name=libstdc++.so)
          if [[ "${libasan_path}" != /* || "${libstdcxx_path}" != /* ]]; then
            echo "::error::could not resolve absolute paths for libasan.so/libstdc++.so via ${compiler_path}" >&2
            exit 1
          fi
          echo "ld_preload=${libasan_path} ${libstdcxx_path}" >> "$GITHUB_OUTPUT"

      - name: Sanity-check the install
        # LD_PRELOAD from the "Resolve ASan runtime paths" step above.
        # ASAN_OPTIONS=detect_leaks=0 suppresses LeakSanitizer's exit-time
        # scan, which otherwise reports CPython's own deliberately-not-
        # cleaned-up interpreter state (interned strings, static type
        # objects, allocator arenas) as leaks -- noise unrelated to whether
        # Cytnx itself leaks. Scoped to this step's env, not exported
        # job-wide, so it doesn't reach the ctest step below, which keeps
        # leak detection on deliberately (see "Run gtest via ctest").
        env:
          LD_PRELOAD: ${{ steps.asan_preload.outputs.ld_preload }}
          ASAN_OPTIONS: detect_leaks=0
        run: python -c "import cytnx; print('cytnx', cytnx.__version__)"

      - name: Build the gtest binary
        # scikit-build-core's build step defaults to the `all` target, which
        # already includes test_main, so in the common case this is a no-op
        # incremental check. We do it explicitly so the workflow doesn't
        # break silently if scikit-build-core or pyproject.toml ever pins
        # `build.targets` to something narrower (e.g. just `install`).
        # test_main has no install() rule, so without this we'd discover
        # the gap only via a missing-binary ctest failure.
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          # `cmake --build` may trigger a CMake reconfigure, which re-evaluates
          # find_package(pybind11); point it at the pybind11 the `dev` extra
          # installed into this env via CMAKE_PREFIX_PATH.
          export CMAKE_PREFIX_PATH="$(python -m pybind11 --cmakedir)${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}"
          cmake --build . --target test_main -j "$(nproc)"

      - name: Run gtest via ctest
        working-directory: ${{ env.BUILD_DIR }}
        run: GTEST_COLOR=1 ctest --output-on-failure --output-junit junit.xml

      - name: Run pytest with Python coverage
        # No PYTHONPATH needed: the editable install already wired up
        # `import cytnx`. .gcda files for any C++ paths exercised here
        # accumulate alongside the .gcno files in $BUILD_DIR.
        #
        # LD_PRELOAD/ASAN_OPTIONS: see "Sanity-check the install" above for
        # why the ASan-instrumented cytnx.so needs both preloaded when
        # hosted in plain `python` (via pytest), and why leak detection is
        # off here specifically.
        env:
          LD_PRELOAD: ${{ steps.asan_preload.outputs.ld_preload }}
          ASAN_OPTIONS: detect_leaks=0
        run: |
          mkdir -p junit
          pytest pytests/ \
            --doctest-modules \
            --junitxml=junit/test-results.xml \
            --cov=cytnx \
            --cov-branch \
            --cov-report=xml:coverage-python.xml \
            --cov-report=term

      - name: Collect C++ coverage with gcovr
        working-directory: ${{ env.BUILD_DIR }}
        # Runs after BOTH ctest and pytest, so .gcda counters reflect:
        #   - the gtest binary in tests/
        #   - C++ paths exercised through the Python bindings under pytest
        # pybind/ is intentionally kept; codecov.yml gives it its own
        # component in the PR comment.
        #
        # --exclude-branches-by-pattern '.*' strips ALL branch records from
        # the XML, so the `cpp` flag gates on line coverage only (#932):
        # gcov branch data counts compiler-generated CFG arcs (exception
        # unwind, destructors, inlined STL) that tests cannot exercise.
        # Python coverage is unaffected and keeps --cov-branch.
        run: |
          gcovr -r ${{ github.workspace }} . \
            --xml-pretty -o coverage-cpp.xml \
            --exclude-branches-by-pattern '.*' \
            --exclude '.*_deps.*' \
            --exclude '.*thirdparty.*' \
            --exclude '.*tests/.*' \
            --exclude '.*benchmarks/.*' \
            --exclude '.*example/.*'

      - name: Upload C++ coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ env.BUILD_DIR }}/coverage-cpp.xml
          flags: cpp
          name: cpp-coverage
          disable_search: true
          fail_ci_if_error: true
          verbose: true

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ github.workspace }}/coverage-python.xml
          flags: python
          name: python-coverage
          disable_search: true
          fail_ci_if_error: true
          verbose: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ env.BUILD_DIR }}/junit.xml,${{ github.workspace }}/junit/test-results.xml
          report_type: test_results
          disable_search: true
          fail_ci_if_error: true
          verbose: true
