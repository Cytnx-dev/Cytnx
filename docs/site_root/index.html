<!doctype html>
<meta charset="utf-8">
<title>Cytnx documentation</title>
<script>
// Redirect to the canonical landing version. Prefer the `stable` alias once a
// release has published it; otherwise fall back to the first entry in
// versions.json (the dev docs, until the first release exists). versions.json
// is the single source of truth, so this file needs no per-release edit.
(function () {
  function go(slug) { window.location.replace(slug + '/'); }
  fetch('versions.json', { cache: 'no-store' })
    .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
    .then(function (entries) {
      var stable = entries.find(function (e) { return e.version === 'stable'; });
      var target = stable || entries[0];
      go(target ? target.version : 'dev');
    })
    .catch(function () { go('dev'); });
})();
</script>
<noscript><meta http-equiv="refresh" content="0; url=./dev/"></noscript>
<p>Redirecting to the Cytnx documentation&hellip;</p>
