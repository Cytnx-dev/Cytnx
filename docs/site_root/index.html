<!doctype html>
<meta charset="utf-8">
<title>Cytnx documentation</title>
<script>
// Redirect the documentation root to the latest stable release -- the
// highest-numbered version listed in versions.json -- and fall back to the
// dev docs until the first release exists. versions.json is the single
// source of truth, so this file needs no per-release edit.
(function () {
  function go(slug) { window.location.replace(slug + '/'); }
  // Parse a "MAJOR.MINOR.PATCH" slug into a comparable array; non-numeric
  // slugs such as "dev" return null and are ignored.
  function parseVersion(v) {
    var m = /^(\d+)(?:\.(\d+))?(?:\.(\d+))?/.exec(v);
    return m ? [+m[1], +(m[2] || 0), +(m[3] || 0)] : null;
  }
  function newer(a, b) { return (a[0] - b[0]) || (a[1] - b[1]) || (a[2] - b[2]); }
  function latestRelease(entries) {
    var best = null, bestVer = null;
    entries.forEach(function (e) {
      var ver = parseVersion(e.version);
      if (ver && (!bestVer || newer(ver, bestVer) > 0)) {
        bestVer = ver; best = e.version;
      }
    });
    return best;
  }
  fetch('versions.json', { cache: 'no-store' })
    .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
    .then(function (entries) { go(latestRelease(entries) || 'dev'); })
    .catch(function () { go('dev'); });
})();
</script>
<noscript><meta http-equiv="refresh" content="0; url=./dev/"></noscript>
<p>Redirecting to the Cytnx documentation&hellip;</p>
