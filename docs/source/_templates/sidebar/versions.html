<div class="sidebar-tree" id="cytnx-version-switcher" hidden>
  <p class="caption" role="heading">
    <span class="caption-text">{{ _('Versions') }}</span>
  </p>
  <ul></ul>
</div>
<script>
(function () {
  // The deployed site lays each version out under <site_root>/<slug>/...,
  // where <slug> is "dev", "stable", or a release like "0.10.0". The same
  // switcher.json lives at <site_root>/switcher.json and lists every slug.
  // Use Sphinx's `pagename` (the page's path under `docs/source/`, no
  // extension) to peel the version slug off the URL: the URL always ends
  // with `<slug>/<pagename>.html`, regardless of any repo-name prefix or
  // custom domain in front of the slug.
  var pagename = "{{ pagename }}";
  var pathParts = window.location.pathname.split('/');
  var depth = pagename.split('/').length - 1;
  var buildRootParts = pathParts.slice(0, -1 - depth);
  if (buildRootParts.length < 2) { return; }
  var siteRoot = buildRootParts.slice(0, -1).join('/') + '/';
  var currentSlug = buildRootParts[buildRootParts.length - 1];
  var relAfterSlug = pathParts.slice(buildRootParts.length).join('/');

  fetch(siteRoot + 'switcher.json', { cache: 'no-store' })
    .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
    .then(function (entries) {
      var container = document.getElementById('cytnx-version-switcher');
      if (!container) { return; }
      var list = container.querySelector('ul');
      entries.forEach(function (entry) {
        var li = document.createElement('li');
        li.className = 'toctree-l1';
        var a = document.createElement('a');
        a.className = 'reference';
        a.href = siteRoot + entry.version + '/' + relAfterSlug;
        a.textContent = entry.name;
        if (entry.version === currentSlug) {
          li.classList.add('current');
          a.setAttribute('aria-current', 'page');
        }
        li.appendChild(a);
        list.appendChild(li);
      });
      container.hidden = false;
    })
    .catch(function () { /* Local builds without switcher.json: stay hidden. */ });
})();
</script>
